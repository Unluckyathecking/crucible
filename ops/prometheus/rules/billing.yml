# Threshold reference — keep these in sync with the Grafana dashboard panel thresholds
# (ops/grafana/provisioning/dashboards/gateway-overview.json panels 8-10):
#
#   backlog_stale_seconds:    900       15 min — max acceptable lag before revenue risk; matches
#                                       typical Stripe meter_event settling window.
#   backlog_units_critical:   1000000   1 M units — calibrate to highest-tier plan × billing period;
#                                       chosen to fire only after extended pipeline outage.
#   unbillable_threshold:     0         any non-zero signals a customer linking gap; zero
#                                       means the metric is purely boolean in practice.
#
# Flusher tick period: the default is 30 s (set in gateway/cmd/gateway/main.go). The
# gauge is updated each tick, so with a 30 s period the `for` windows below (5 m and
# 10 m) are comfortably larger than the update interval.

groups:
  - name: crucible-billing-backlog
    interval: 1m
    rules:
      # Alert when the oldest unflushed usage row is older than 15 minutes (900 s).
      # A stalled flusher or Stripe outage will trigger this before revenue is lost.
      - alert: BillingBacklogStale
        expr: crucible_billing_backlog_oldest_age_seconds > 900
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Billing flush backlog stale: oldest unflushed row is {{ $value | humanizeDuration }} old"
          description: >
            crucible_billing_backlog_oldest_age_seconds has been above 900 s (15 min) for 5 minutes.
            The flusher may be stuck or Stripe may be unreachable. Check crucible_billing_flush_total{outcome="error"}.

      # Alert when the backlog exceeds 1 000 000 units for 10 minutes.
      # This volume implies the flush pipeline has been blocked for an extended period.
      - alert: BillingBacklogUnitsCritical
        expr: crucible_billing_backlog_units > 1000000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Billing backlog exceeds 1M units ({{ $value }} units unflushed)"
          description: >
            crucible_billing_backlog_units has exceeded 1 000 000 for 10 minutes.
            This suggests the flush pipeline has been blocked for an extended period.

      # Alert when the Stripe flush error rate exceeds 10% over 5 minutes.
      # Catches Stripe API failures or rate-limiting that don't yet manifest as
      # backlog growth (e.g., batches that are retried and eventually succeed).
      - alert: BillingFlushErrorRateElevated
        expr: |
          sum(rate(crucible_billing_flush_total{outcome="error"}[5m]))
          /
          sum(rate(crucible_billing_flush_total[5m]))
          > 0.1
          and
          sum(rate(crucible_billing_flush_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Billing flush error rate elevated ({{ $value | humanizePercentage }})"
          description: >
            More than 10% of crucible_billing_flush_total events are outcome="error"
            over the last 5 minutes. Check Stripe API health and gateway logs.
            Individual batches are retried automatically with the same idempotency key.

      # Alert when any permanently-unbillable usage is detected (threshold: 0).
      # The 10-minute `for` window avoids noise from customers who sign up, use the API,
      # and get linked within minutes. Reduce to 5m on high-value plans where even a brief
      # linking gap represents meaningful revenue risk.
      # These units belong to customers with no stripe_customer_id and will never be billed.
      - alert: BillingUnbillableUsageDetected
        expr: crucible_billing_unbillable_units > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Permanently unbillable usage: {{ $value }} units for Stripe-unlinked customers"
          description: >
            crucible_billing_unbillable_units is non-zero for 10 minutes.
            Usage_events rows exist for customers with stripe_customer_id IS NULL.
            These rows are silently excluded by the flush filter and will never reach Stripe.
            Link the affected customers to a Stripe customer to stop the revenue leak.
