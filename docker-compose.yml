# Crucible local development stack.
# `make dev` brings up postgres + redis + worker + gateway end-to-end.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crucible
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: crucible
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crucible -d crucible"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: workers/stubs/go/Dockerfile
    environment:
      PORT: "8081"
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      # The gateway go.mod replaces shared modules under workers/, so its
      # Docker build needs the repository root as context.
      context: .
      dockerfile: gateway/Dockerfile
    env_file: .env
    environment:
      WORKER_URL: http://worker:8081
      POSTGRES_DSN: postgres://crucible:${POSTGRES_PASSWORD}@postgres:5432/crucible?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    expose:
      - "9090"  # metrics (scraped internally by prometheus)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      TLS_POLICY: ${TLS_POLICY:-internal}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./ops/prometheus:/etc/prometheus:ro
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    depends_on:
      gateway:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
    depends_on:
      prometheus:
        condition: service_started

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file: ./dashboard/.env.local
    environment:
      DATABASE_URL: postgres://crucible:${POSTGRES_PASSWORD}@postgres:5432/crucible
      AUTH_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg-data:
  caddy_data:
  caddy_config:
