# Exclude auto-generated, large binary-like, and low-signal files.
exclude_patterns:
  - "docs-internal/**"
  - "gateway/go.sum"
  - ".gitignore"
  - "ops/grafana/**"
  # Build-metadata files: Go version bumps trigger false-positive "hallucinated version"
  # prose that consumes the entire output budget before JSON findings are written.
  # Listed as exact paths because the action's glob engine does not support leading **.
  - "go.work"
  - "gateway/go.mod"
  - "gateway/Dockerfile"
  - "workers/sdk-go/go.mod"
  - "workers/stubs/go/go.mod"
  - "workers/stubs/go/Dockerfile"
  - "gateway/migrations/**"
  # Test harness (infrastructure, not scenarios): 630 LOC of complex cleanup
  # code consistently exhausts the Kimi output budget before JSON is written.
  # Listed as exact path: the action's glob engine does not support ** patterns.
  - "gateway/test/harness/harness.go"
