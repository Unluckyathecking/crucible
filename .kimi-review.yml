# Exclude large non-production files to keep Kimi's response below the JSON
# parse limit (~43 KB). Test files are excluded because they account for the
# majority of token consumption while adding little review signal vs the
# production code changes. Grafana JSON and go.sum are also excluded.
exclude_patterns:
  - "docs-internal/**"
  - "gateway/go.sum"
  - ".gitignore"
  - "ops/grafana/**"
  - "gateway/internal/usage/reconcile_test.go"
  - "gateway/internal/usage/flusher_test.go"
  - "gateway/internal/usage/flusher_bench_test.go"
  - "gateway/internal/usage/recorder_test.go"
