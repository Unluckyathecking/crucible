# Exclude auto-generated, large binary-like, and truly low-signal files.
# Benchmark tests are excluded (low review value). Integration tests are included
# so reviewers can verify that tests actually exercise the production guarantees.
exclude_patterns:
  - "docs-internal/**"
  - "gateway/go.sum"
  - ".gitignore"
  - "ops/grafana/**"
  - "gateway/internal/usage/*_bench_test.go"
