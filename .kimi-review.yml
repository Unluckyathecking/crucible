# Exclude auto-generated, large binary-like, and low-signal files.
exclude_patterns:
  - "docs-internal/**"
  - "gateway/go.sum"
  - ".gitignore"
  - "ops/grafana/**"
  # Build metadata: version bumps trigger false-positive "hallucinated version" prose
  # that consumes the entire output budget before reaching JSON findings.
  - "**/*.mod"
  - "go.work"
  - "**/Dockerfile"
  - ".github/workflows/**"
