name: Client SDK drift guard

on:
  push:
    branches: ["main"]
    paths:
      - "clients/openapi.json"
      - "clients/go/**"
      - "clients/typescript/**"
      - "clients/python/**"
      - "scripts/gen-clients.sh"
      - "gateway/cmd/spec-dump/**"
      - "gateway/internal/openapi/**"
      - "gateway/internal/server/routes.go"
      - "gateway/internal/server/routes_table.go"
      - ".github/workflows/client-sdk-drift.yml"
  pull_request:
    paths:
      - "clients/openapi.json"
      - "clients/go/**"
      - "clients/typescript/**"
      - "clients/python/**"
      - "scripts/gen-clients.sh"
      - "gateway/cmd/spec-dump/**"
      - "gateway/internal/openapi/**"
      - "gateway/internal/server/routes.go"
      - "gateway/internal/server/routes_table.go"
      - ".github/workflows/client-sdk-drift.yml"

jobs:
  drift:
    name: Drift guard + client tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: |
            gateway/go.sum
            clients/go/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: clients/typescript/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # gateway/cmd/spec-dump renders the gateway's real served OpenAPI
      # document (openapi.Build + openapi.Handler, the same code path
      # routes.go mounts at GET /openapi.json). Comparing its output to the
      # committed clients/openapi.json is what actually catches drift between
      # the framework's routes and the snapshot the SDK generator reads —
      # the "Regenerate clients from snapshot" step below only proves the
      # clients match the snapshot, not that the snapshot itself is current.
      - name: Verify openapi.json matches the gateway's served document
        run: |
          go run ./gateway/cmd/spec-dump > /tmp/served-openapi.json
          diff -u clients/openapi.json /tmp/served-openapi.json

      - name: Regenerate clients from snapshot
        run: bash scripts/gen-clients.sh

      - name: Fail if clients drift from spec
        run: git diff --exit-code clients/

      - name: Go client — build and test
        working-directory: clients/go
        run: go build ./... && go test -race ./...

      - name: TypeScript client — install, build, and test
        working-directory: clients/typescript
        run: npm ci && npm run build && npm test

      - name: Python client — install and test
        working-directory: clients/python
        run: |
          pip install -e ".[dev]"
          pytest -q
