name: new-tool-smoke
on:
  push:
    branches: [main]
  pull_request:

# The framework's whole value rests on `scripts/new-tool.sh` working. If it silently
# rots, every clone breaks and we won't find out until someone tries it. Smoke-test it.

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # smoke and acceptance are required checks, so they gate on changed paths at
  # the job level (a skipped job satisfies branch protection; a workflow-level
  # paths filter would not). Pushes to main always run both.
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "$changed"
          if echo "$changed" | grep -qE '^(scripts/|gateway/|workers/|clients/|test/|go\.work|docker-compose\.yml|Caddyfile|Makefile|\.env\.example|\.github/workflows/new-tool-smoke\.yml)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "no clone-affecting changes; skipping"
          fi

  smoke:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-go
        with:
          # The clone smoke intentionally tracks the floating minor, not the exact pin.
          go-version: "1.25"
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: smoke-new-tool
        run: bash scripts/smoke-new-tool.sh

  # Compiling isn't enough: prove the demo clone actually runs the frozen HTTP/JSON
  # contract, gateway -> real workers/active worker -> billing, end to end.
  acceptance:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crucible
          POSTGRES_PASSWORD: ci_test
          POSTGRES_DB: crucible
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crucible"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-go
        with:
          # The clone smoke intentionally tracks the floating minor, not the exact pin.
          go-version: "1.25"
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: clone demo tree
        run: bash scripts/new-tool.sh demo-clone-acceptance "$RUNNER_TEMP/demo-clone-acceptance"
      - name: go work sync
        working-directory: ${{ runner.temp }}/demo-clone-acceptance
        run: go work sync
      - name: acceptance-run
        working-directory: ${{ runner.temp }}/demo-clone-acceptance
        env:
          POSTGRES_DSN: postgres://crucible:ci_test@localhost:5432/crucible?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: bash scripts/acceptance-run.sh
