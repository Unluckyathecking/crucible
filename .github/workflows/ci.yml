name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crucible
          POSTGRES_DB: crucible
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crucible"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
          cache-dependency-path: |
            gateway/go.sum
            workers/sdk-go/go.sum
            workers/stubs/go/go.sum
      - name: go.work sync
        run: go work sync
      - name: Apply gateway migrations
        run: |
          for f in gateway/migrations/*.sql; do
            echo "applying $f";
            psql "$POSTGRES_DSN" -v ON_ERROR_STOP=1 -f "$f";
          done
        env:
          POSTGRES_DSN: postgres://crucible@localhost:5432/crucible?sslmode=disable
      - name: gateway test
        env:
          REDIS_URL: redis://localhost:6379
          POSTGRES_DSN: postgres://crucible@localhost:5432/crucible?sslmode=disable
        run: cd gateway && go vet ./... && go test -race ./...
      - name: integration test
        timeout-minutes: 5
        env:
          REDIS_URL: redis://localhost:6379
          POSTGRES_DSN: postgres://crucible@localhost:5432/crucible?sslmode=disable
        run: cd gateway && go vet ./test/... && go test -race ./test/...

      - name: sdk-go test
        run: cd workers/sdk-go && go vet ./... && go test -race ./...
      - name: worker stub build
        run: cd workers/stubs/go && go vet ./... && go build ./...

      - name: docker compose build
        run: docker compose build gateway worker dashboard

      - name: go version drift check
        run: |
          set -e

          # Extract go version from go.mod (e.g. "1.25.0" from "go 1.25.0")
          GOMOD_VERSION=$(grep '^go ' gateway/go.mod | awk '{print $2}')
          echo "go.mod version: $GOMOD_VERSION"

          # Extract go version from gateway Dockerfile FROM line.
          # Regex matches any image suffix (alpine, bookworm, etc.) or no suffix.
          GW_FROM=$(grep -m1 '^FROM golang:' gateway/Dockerfile | sed 's/^FROM golang:\([0-9][0-9.]*\).*/\1/')
          echo "gateway/Dockerfile golang version: $GW_FROM"
          if [ "$GOMOD_VERSION" != "$GW_FROM" ]; then
            echo "ERROR: gateway/Dockerfile golang version mismatch. go.mod=$GOMOD_VERSION, Dockerfile=$GW_FROM"
            exit 1
          fi

          # Extract go version from workers/active/Dockerfile FROM line.
          WF_FROM=$(grep -m1 '^FROM golang:' workers/active/Dockerfile | sed 's/^FROM golang:\([0-9][0-9.]*\).*/\1/')
          echo "workers/active/Dockerfile golang version: $WF_FROM"
          if [ "$GOMOD_VERSION" != "$WF_FROM" ]; then
            echo "ERROR: workers/active/Dockerfile golang version mismatch. go.mod=$GOMOD_VERSION, Dockerfile=$WF_FROM"
            exit 1
          fi

          echo "Go version drift check passed."

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
          cache-dependency-path: |
            gateway/go.sum
            workers/sdk-go/go.sum
            workers/stubs/go/go.sum
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck gateway
        run: cd gateway && govulncheck ./...
      - name: govulncheck sdk-go
        run: cd workers/sdk-go && govulncheck ./...
      - name: govulncheck worker stub
        run: cd workers/stubs/go && govulncheck ./...

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workers/sdk-rust
      - name: cargo check
        run: cd workers/sdk-rust && cargo check
      - name: cargo clippy
        run: cd workers/sdk-rust && cargo clippy -- -D warnings
      - name: cargo test
        run: cd workers/sdk-rust && cargo test

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: pnpm install
        run: cd dashboard && pnpm install --frozen-lockfile --ignore-scripts
      - name: dashboard test
        run: cd dashboard && pnpm test
      - name: pnpm build
        run: cd dashboard && pnpm build
