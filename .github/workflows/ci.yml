name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            gateway/go.sum
            workers/sdk-go/go.sum
            workers/stubs/go/go.sum
      - name: go.work sync
        run: go work sync
      - name: gateway test
        run: cd gateway && go vet ./... && go test -race ./...
      - name: sdk-go test
        run: cd workers/sdk-go && go vet ./... && go test -race ./...
      - name: worker stub build
        run: cd workers/stubs/go && go vet ./... && go build ./...

      - name: docker compose build
        run: docker compose build gateway worker dashboard

      - name: go version drift check
        run: |
          set -e

          # Extract go version from go.mod (e.g. "1.25.0" from "go 1.25.0")
          GOMOD_VERSION=$(grep '^go ' gateway/go.mod | awk '{print $2}')
          echo "go.mod version: $GOMOD_VERSION"

          # Extract go version from gateway Dockerfile FROM line
          GW_FROM=$(grep -m1 '^FROM golang:' gateway/Dockerfile | sed 's/.*golang:\(.*\)-alpine.*/\1/')
          echo "gateway/Dockerfile golang version: $GW_FROM"
          if [ "$GOMOD_VERSION" != "$GW_FROM" ]; then
            echo "ERROR: gateway/Dockerfile golang version mismatch. go.mod=$GOMOD_VERSION, Dockerfile=$GW_FROM"
            exit 1
          fi

          # Extract go version from workers/active/Dockerfile FROM line
          WF_FROM=$(grep -m1 '^FROM golang:' workers/active/Dockerfile | sed 's/.*golang:\(.*\)-alpine.*/\1/')
          echo "workers/active/Dockerfile golang version: $WF_FROM"
          if [ "$GOMOD_VERSION" != "$WF_FROM" ]; then
            echo "ERROR: workers/active/Dockerfile golang version mismatch. go.mod=$GOMOD_VERSION, Dockerfile=$WF_FROM"
            exit 1
          fi

          echo "Go version drift check passed."

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workers/sdk-rust
      - name: cargo check
        run: cd workers/sdk-rust && cargo check
      - name: cargo clippy
        run: cd workers/sdk-rust && cargo clippy -- -D warnings
      - name: cargo test
        run: cd workers/sdk-rust && cargo test

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: pnpm install
        run: cd dashboard && pnpm install --config.verify-store-integrity=false
      - name: pnpm build
        run: cd dashboard && pnpm build
