name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Superseded PR pushes cancel their in-flight run; main pushes queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decides which surfaces a PR actually touches. The gated jobs below are
  # required checks; a job skipped via its condition still satisfies branch
  # protection, while a workflow-level paths filter would leave the check
  # stuck at "expected". Pushes to main always run everything.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            printf 'go=true\nrust=true\ndashboard=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "$changed"
          match() { echo "$changed" | grep -qE "$1" && echo true || echo false; }
          {
            echo "go=$(match '^(gateway/|workers/|clients/go/|test/conformance/|go\.work|docker-compose\.yml|Caddyfile|scripts/|\.github/workflows/ci\.yml)')"
            echo "rust=$(match '^(workers/sdk-rust/|workers/stubs/rust/|\.github/workflows/ci\.yml)')"
            echo "dashboard=$(match '^(dashboard/|\.github/workflows/ci\.yml)')"
          } >> "$GITHUB_OUTPUT"

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crucible
          POSTGRES_PASSWORD: ci_test
          POSTGRES_DB: crucible
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crucible"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.12"
          cache: true
          cache-dependency-path: |
            gateway/go.sum
            workers/sdk-go/go.sum
            workers/stubs/go/go.sum
      - name: go.work sync
        run: go work sync
      - name: Apply gateway migrations
        run: |
          for f in gateway/migrations/*.sql; do
            echo "applying $f";
            psql "$POSTGRES_DSN" -v ON_ERROR_STOP=1 -f "$f";
          done
        env:
          POSTGRES_DSN: postgres://crucible:ci_test@localhost:5432/crucible?sslmode=disable
      - name: gateway test
        timeout-minutes: 10
        env:
          REDIS_URL: redis://localhost:6379
          POSTGRES_DSN: postgres://crucible:ci_test@localhost:5432/crucible?sslmode=disable
        # -p 1 serialises these DB-backed package tests so parallel packages don't race one another on the shared CI Postgres.
        run: cd gateway && go vet ./... && go test -p 1 -race -timeout 9m $(go list ./... | grep -v '/test')
      - name: gateway integration tests
        # timeout-minutes (15) is 3m beyond the binary -timeout (12m) so the job watchdog
        # fires only on genuine hangs; the extra time lets cleanup goroutines flush and
        # SIGQUIT stack dumps print before the step is forcibly killed.
        timeout-minutes: 15
        env:
          REDIS_URL: redis://localhost:6379
          POSTGRES_DSN: postgres://crucible:ci_test@localhost:5432/crucible?sslmode=disable
        # -race: data-race detector; -count=1: disables test result caching; -shuffle=on: randomises order.
        # -p 1 serialises the DB-backed test packages so they don't race each other applying migrations to the shared CI Postgres.
        run: cd gateway && go vet ./test/... && go test -p 1 -race -count=1 -shuffle=on -timeout 12m ./test/...

      - name: sdk-go test
        run: cd workers/sdk-go && go vet ./... && go test -race ./...
      - name: worker stub build
        run: cd workers/stubs/go && go vet ./... && go build ./...

      - name: docker compose build
        run: docker compose build gateway worker dashboard

      - name: go version drift check
        run: |
          set -e

          # Extract go version from go.mod (e.g. "1.25.0" from "go 1.25.0").
          # go work sync normalises two-part "go 1.25" → three-part "go 1.25.0", so
          # we compare only the major.minor portion — "1.25.0" and "1.25" are both "1.25".
          GOMOD_VERSION=$(grep '^go ' gateway/go.mod | awk '{print $2}')
          echo "go.mod version: $GOMOD_VERSION"
          GOMOD_MINOR=$(echo "$GOMOD_VERSION" | awk -F. '{print $1"."$2}')

          # Extract go version from gateway Dockerfile FROM line.
          # Regex matches any image suffix (alpine, bookworm, etc.) or no suffix.
          GW_FROM=$(grep -m1 '^FROM golang:' gateway/Dockerfile | sed -nE 's/^FROM golang:([0-9]+(\.[0-9]+)*)([-@+].*)?$/\1/p')
          if [ -z "$GW_FROM" ]; then
            echo "ERROR: could not extract golang version from gateway/Dockerfile"
            exit 1
          fi
          GW_MINOR=$(echo "$GW_FROM" | awk -F. '{print $1"."$2}')
          echo "gateway/Dockerfile golang version: $GW_FROM"
          if [ "$GOMOD_MINOR" != "$GW_MINOR" ]; then
            echo "ERROR: gateway/Dockerfile golang version mismatch. go.mod minor=$GOMOD_MINOR, Dockerfile minor=$GW_MINOR (go.mod=$GOMOD_VERSION, Dockerfile=$GW_FROM)"
            exit 1
          fi

          # Extract go version from workers/active/Dockerfile FROM line.
          # workers/active is a symlink to the current worker implementation (e.g. workers/stubs/go).
          WF_FROM=$(grep -m1 '^FROM golang:' workers/active/Dockerfile | sed -nE 's/^FROM golang:([0-9]+(\.[0-9]+)*)([-@+].*)?$/\1/p')
          if [ -z "$WF_FROM" ]; then
            echo "ERROR: could not extract golang version from workers/active/Dockerfile"
            exit 1
          fi
          WF_MINOR=$(echo "$WF_FROM" | awk -F. '{print $1"."$2}')
          echo "workers/active/Dockerfile golang version: $WF_FROM"
          if [ "$GOMOD_MINOR" != "$WF_MINOR" ]; then
            echo "ERROR: workers/active/Dockerfile golang version mismatch. go.mod minor=$GOMOD_MINOR, Dockerfile minor=$WF_MINOR (go.mod=$GOMOD_VERSION, Dockerfile=$WF_FROM)"
            exit 1
          fi

          echo "Go version drift check passed."

  govulncheck:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.12"
          cache: true
          cache-dependency-path: |
            gateway/go.sum
            workers/sdk-go/go.sum
            workers/stubs/go/go.sum
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck gateway
        run: cd gateway && govulncheck ./...
      - name: govulncheck sdk-go
        run: cd workers/sdk-go && govulncheck ./...
      - name: govulncheck worker stub
        run: cd workers/stubs/go && govulncheck ./...

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: clippy
      - name: rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: workers/sdk-rust
      - name: cargo check
        run: cd workers/sdk-rust && cargo check
      - name: cargo clippy
        run: cd workers/sdk-rust && cargo clippy -- -D warnings
      - name: cargo test
        run: cd workers/sdk-rust && cargo test

  dashboard:
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - name: pnpm install
        run: cd dashboard && pnpm install --frozen-lockfile --ignore-scripts
      - name: dashboard test
        run: cd dashboard && pnpm test
      - name: pnpm build
        run: cd dashboard && pnpm build
