name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request against the repo's own standards before
            anything generic:

            1. CLAUDE.md is the operating standard — flag violations of its
               load-bearing invariants: tool.proto stays frozen (no per-product
               fields), the gateway keeps rejecting success responses with
               billable_units < 1, webhook handlers dispatch before recording
               the dedup row, the usage flusher keeps its two-phase stable
               batch_id design, and key revocation goes through Store.Revoke.
               Also flag speculative abstraction, non-surgical changes, and
               oversized modules.
            2. Go/TS mirror pairs: gateway/internal/auth/keys.go and
               dashboard/lib/keys.ts must stay byte-identical in semantics
               (SHA-256 of salt || key, standard padding-free base32,
               PrefixLen = 24). Flag any change to one side without the other.
            3. Billing, auth, and webhook paths: secret comparisons stay
               constant-time (subtle.ConstantTimeCompare, hmac.Equal), the
               Stripe webhook replay window stays at 5 minutes, migrations
               stay idempotent, metric labels stay bounded (RoutePattern,
               never r.URL.Path), and errors to customers never leak
               internals.
            4. Then the usual: correctness, security, performance.

            Be selective — a few findings that matter beat exhaustive nitpicks.
            The PR branch is checked out in the working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) for specific lines.
            Only post GitHub comments - don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"
