name: worker-conformance

on:
  push:
    branches: [main]
  pull_request:

# Each SDK runs its own fixture-driven conformance suite, all loading the same
# source of truth from workers/conformance/fixture.json. A failure in one SDK
# does not cancel the others — fail-fast: false ensures every SDK gets a report.
jobs:
  fixture-conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - id: go
          - id: rust
          - id: ts

    name: fixture-conformance (${{ matrix.sdk.id }})
    steps:
      - uses: actions/checkout@v4

      # ── Go ────────────────────────────────────────────────────────────────

      - name: Set up Go
        if: matrix.sdk.id == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: workers/sdk-go/go.sum

      - name: Go fixture conformance
        if: matrix.sdk.id == 'go'
        working-directory: workers/sdk-go
        run: go test -race ./conformance/... -run TestFixtureDrivenConformance -v

      # ── Rust ─────────────────────────────────────────────────────────────

      - name: Set up Rust toolchain
        if: matrix.sdk.id == 'rust'
        uses: dtolnay/rust-toolchain@1.87

      - name: Rust fixture conformance
        if: matrix.sdk.id == 'rust'
        working-directory: workers/sdk-rust/conformance
        run: cargo test

      # ── TypeScript ────────────────────────────────────────────────────────

      - name: Set up Node.js
        if: matrix.sdk.id == 'ts'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: TS fixture conformance
        if: matrix.sdk.id == 'ts'
        working-directory: workers/sdk-ts
        run: |
          npm ci
          npm run build
          node --test conformance/conformance.test.js
