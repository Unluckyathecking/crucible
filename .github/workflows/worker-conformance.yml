name: worker-conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      # Run all stubs even if one fails so every SDK gets a report.
      fail-fast: false
      matrix:
        stub:
          # ── Add new language stubs here; assertions never change. ──
          - id: go
          - id: rust
          - id: ts
          - id: python

    name: conformance (${{ matrix.stub.id }} stub)
    steps:
      - uses: actions/checkout@v4

      # Go is always needed: the conformance suite itself is written in Go.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            workers/sdk-go/go.sum
            workers/stubs/go/go.sum
            test/conformance/go.sum

      - name: Set up Rust toolchain
        if: matrix.stub.id == 'rust'
        uses: dtolnay/rust-toolchain@1.87

      - name: Set up Node.js
        if: matrix.stub.id == 'ts'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        if: matrix.stub.id == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run conformance harness
        run: bash scripts/conformance-run.sh ${{ matrix.stub.id }}
