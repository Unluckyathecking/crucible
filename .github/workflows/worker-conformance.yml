name: worker-conformance

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "test/conformance/**"
      - "scripts/conformance-run.sh"
      - ".github/workflows/worker-conformance.yml"
  pull_request:
    paths:
      - "workers/**"
      - "test/conformance/**"
      - "scripts/conformance-run.sh"
      - ".github/workflows/worker-conformance.yml"

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Two complementary conformance jobs run in parallel:
#
# fixture-conformance — per-SDK in-process runners (Go/Rust/TS) each load
#   workers/conformance/fixture.json as the single source of truth and assert
#   the frozen /invoke contract without starting a real server.
#
# python-stub-conformance — the Python worker stub has no SDK; it is tested
#   by spinning it up and running the external test/conformance suite against
#   it, preserving the coverage that existed before this PR.
#
# fail-fast: false on the SDK matrix ensures every SDK gets a report even if
# one fails.
jobs:
  fixture-conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - id: go
          - id: rust
          - id: ts
          - id: python

    name: fixture-conformance (${{ matrix.sdk.id }})
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── Go ────────────────────────────────────────────────────────────────

      - name: Set up Go
        if: matrix.sdk.id == 'go'
        uses: ./.github/actions/setup-go
        with:
          cache-dependency-path: workers/sdk-go/go.sum

      - name: Go fixture conformance
        if: matrix.sdk.id == 'go'
        working-directory: workers/sdk-go
        run: go test -race ./conformance/... -run TestFixtureDrivenConformance -v

      # ── Rust ─────────────────────────────────────────────────────────────

      - name: Set up Rust toolchain
        if: matrix.sdk.id == 'rust'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # pinned action; toolchain input below
        with:
          toolchain: "1.87"

      - name: Rust fixture conformance
        if: matrix.sdk.id == 'rust'
        working-directory: workers/sdk-rust/conformance
        run: cargo test

      # ── TypeScript ────────────────────────────────────────────────────────

      - name: Set up Node.js
        if: matrix.sdk.id == 'ts'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: TS fixture conformance
        if: matrix.sdk.id == 'ts'
        working-directory: workers/sdk-ts
        run: |
          npm ci
          npm run build
          node --test conformance/conformance.test.js

      - name: TS SDK unit tests
        if: matrix.sdk.id == 'ts'
        working-directory: workers/sdk-ts
        run: npm test

      # ── Python ───────────────────────────────────────────────────────────

      - name: Set up Python
        if: matrix.sdk.id == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Python fixture conformance
        if: matrix.sdk.id == 'python'
        working-directory: workers/sdk-python
        run: python3 -m unittest conformance.test_fixture_conformance -v

  # ── Python stub (no SDK — use the external conformance-run.sh suite) ─────────

  python-stub-conformance:
    name: conformance (python stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          cache-dependency-path: |
            workers/sdk-go/go.sum
            test/conformance/go.sum

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Python stub conformance
        run: bash scripts/conformance-run.sh python

      - name: Python stub pytest
        working-directory: workers/stubs/python
        run: |
          pip install pytest
          python3 -m pytest test_worker.py -v
