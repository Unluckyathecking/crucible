name: no-committed-binaries

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fail if any tracked file is a compiled binary
        run: |
          files=$(git ls-files | xargs -r file | grep -E ": .*(Mach-O|ELF|PE32)" || true)
          if [ -n "$files" ]; then
            echo "Compiled binaries found in git index:"
            echo "$files"
            exit 1
          fi
