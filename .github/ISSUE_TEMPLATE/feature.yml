name: Feature proposal
description: Propose a product-neutral Crucible improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What framework-level problem exists, and who encounters it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest product-neutral solution and alternatives considered.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Cover OpenAPI, clients, worker contract, SDKs, configuration, migrations, and operations.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
      description: Usage examples, measurements, prior art, or a prototype.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This proposal belongs in the shared framework rather than one product worker.
          required: true
